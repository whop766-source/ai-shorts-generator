<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>AI Shorts Generator</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            padding: 20px;\n        }\n        .container {\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n        }\n        .grid {\n            display: grid;\n            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));\n            gap: 16px;\n            margin-top: 20px;\n        }\n        .video-player {\n            width: 100%;\n            height: auto;\n            background: #000;\n        }\n    </style>\n</head>\n<body>\n    <div class="container">\n        <h1>AI Shorts Generator</h1>\n        <input type="text" id="videoUrl" placeholder="Enter Video URL"/>\n        <button id="generateButton">Generate AI Shorts</button>\n        <div id="loadingIndicator" style="display:none;">Loading...</div>\n        <div class="grid" id="videoGrid"></div>\n    </div>\n    <script>\n        document.getElementById('generateButton').onclick = function() {\n            document.getElementById('loadingIndicator').style.display = 'block';\n            // Simulate video generation\n            setTimeout(function() {\n                document.getElementById('loadingIndicator').style.display = 'none';\n                var grid = document.getElementById('videoGrid');\n                var videoElement = document.createElement('video');\n                videoElement.src = 'generated_video.mp4'; // Placeholder for generated video\n                videoElement.controls = true;\n                videoElement.className = 'video-player';\n                grid.appendChild(videoElement);\n            }, 2000);\n        };\n    <\/script>\n</body>\n</html>
